name: iOS CI

on:
  push:
    branches: [main]
    paths: ['ios/**', '.github/workflows/ios.yml']
  pull_request:
    branches: [main]
    paths: ['ios/**']

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Clone llmfarm with token auth
        run: |
          GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          git clone --depth=1 --branch main \
            "https://x-access-token:${GH_TOKEN}@github.com/modelcontextprotocol/llmfarm.git" \
            llmfarm_local
          ls llmfarm_local/

      - name: Verify Xcode version
        run: |
          xcodebuild -version
          which xcodegen || brew install xcodegen
          xcodegen --version

      - name: Generate Xcode project (local llmfarm)
        run: |
          cd ios
          # Use local package path instead of URL
          sed -i '' \
            's|url: https://github.com/modelcontextprotocol/llmfarm.git|path: ../llmfarm_local|' \
            project.yml
          grep -A2 llmfarm project.yml
          xcodegen generate

      - name: Build iOS App
        run: |
          cd ios
          xcodebuild -project CunyiAI.xcodeproj \
            -scheme CunyiAI \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build \
            CODE_SIGNING_ALLOWED=NO
