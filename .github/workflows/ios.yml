name: iOS CI

on:
  push:
    branches: [main]
    paths: ['ios/**', '.github/workflows/ios.yml']
  pull_request:
    branches: [main]
    paths: ['ios/**']

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Xcode version
        run: |
          xcodebuild -version
          which xcodegen || brew install xcodegen
          xcodegen --version

      - name: Generate Xcode project
        run: |
          cd ios
          xcodegen generate

      - name: Build iOS App
        run: |
          cd ios
          # Use generic iOS Simulator (any available device)
          xcodebuild -project CunyiAI.xcodeproj \
            -scheme CunyiAI \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -destination-timeout 300 \
            build \
            CODE_SIGNING_ALLOWED=NO
