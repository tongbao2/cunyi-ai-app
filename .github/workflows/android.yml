name: Android CI

on:
  push:
    branches: [main]
    paths: ['android/**', '.github/workflows/android.yml']
  pull_request:
    branches: [main]
    paths: ['android/**']

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Clone LiteRT-LM
        run: |
          mkdir -p shared-assets
          git clone --depth=1 --branch v0.10.1 \
            https://github.com/google-ai-edge/LiteRT-LM.git \
            shared-assets/litert-lm

      - name: Generate Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version=8.7

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        # Do NOT override JAVA_HOME - let setup-java set it

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cunyi-ai-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
