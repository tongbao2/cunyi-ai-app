name: Android CI

on:
  push:
    branches: [main]
    paths: ['android/**', '.github/workflows/android.yml']
  pull_request:
    branches: [main]
    paths: ['android/**']

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone LiteRT-LM submodule
        run: |
          mkdir -p shared-assets
          git clone --depth=1 --branch v0.10.1 \
            https://github.com/google-ai-edge/LiteRT-LM.git \
            shared-assets/litert-lm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.11_9/x64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload to GitHub Release (on main push with tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: "村医AI Android APK 自动构建"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
