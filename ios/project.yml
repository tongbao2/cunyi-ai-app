name: CunyiAI
options:
  bundleIdPrefix: com.cunyi
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_BITCODE: NO

packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit.git
    from: "5.7.0"

targets:
  CunyiAI:
    type: application
    platform: iOS
    sources:
      - path: CunyiAI/Sources
      - path: llama.swift/Sources
    resources:
      - path: CunyiAI/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cunyi.ai
        INFOPLIST_FILE: CunyiAI/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: SnapKit
