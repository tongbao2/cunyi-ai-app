name: CunyiAI
options:
  bundleIdPrefix: com.cunyi
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_BITCODE: NO

packages:
  llmfarm_core:
    url: https://github.com/modelcontextprotocol/llmfarm.git
    branch: main
  SnapKit:
    url: https://github.com/SnapKit/SnapKit.git
    from: "5.7.0"

targets:
  CunyiAI:
    type: application
    platform: iOS
    sources:
      - path: CunyiAI/Sources
    resources:
      - path: CunyiAI/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cunyi.ai
        INFOPLIST_FILE: CunyiAI/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - package: llmfarm_core
      - package: SnapKit
    info:
      path: CunyiAI/Resources/Info.plist
      properties:
        CFBundleName: 村医AI
        CFBundleDisplayName: 村医AI
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UIRequiredDeviceCapabilities:
          - arm64
        UIBackgroundModes:
          - fetch
          - processing
